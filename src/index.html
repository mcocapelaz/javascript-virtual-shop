<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1.N Título</title>
    <link
      href="https://fonts.googleapis.com/css?family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./scss/main.scss" />
    <link rel="icon" href="/images/favicon.png" />
  </head>

  <body>
    <!-- HEADER -->

    <header class="header">
      <h1 class="title">Online gift shop</h1>

      <!-- SEARCH BAR -->

      <div class="search">
        <input
          type="text"
          id="search-input"
          class="search__input"
          placeholder="What do you want to buy today?"
        />
        <button id="search-btn" class="search__button">Search</button>
      </div>
    </header>

    <!-- MAIN -->

    <main class="main">
      <section class="products" id="product-list">
        <!-- Products inserted by JS -->
      </section>

      <!-- CART SIDEBAR -->

      <aside class="cart" id="cart">
        <h2 class="cart__title">Your cart</h2>
        <ul class="cart__list" id="cart-list">         
        </ul>
        

        <p class="cart__total">Total: <span id="cart-total">0 €</span></p>
        <button id="clear-cart" class="cart__clear">Clear cart</button>
        
        <button class="cart__checkout">Checkout</button>
      </aside>
    </main>
    <script src="./js/main.js"></script>
  </body>
</html>
